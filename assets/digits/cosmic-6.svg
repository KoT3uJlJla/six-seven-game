<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="csm6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7df9ff"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0083b0"/>
    </linearGradient>
    <filter id="csmGlow6" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="csmShadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00e5ff" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#00e5ff" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#csmShadow6)">
    <!-- stars -->
    <g fill="#ffffff">
      <polygon points="25,38 28,46 36,46 30,52 32,60 25,55 18,60 20,52 14,46 22,46" opacity="0.9"/>
      <polygon points="172,72 174,78 180,78 175,82 177,88 172,85 167,88 169,82 164,78 170,78" opacity="0.8"/>
      <circle cx="180" cy="200" r="2.5" opacity="0.85"/>
      <circle cx="20" cy="180" r="2" opacity="0.8"/>
      <circle cx="155" cy="32" r="1.8" opacity="0.9"/>
    </g>
    <text x="100" y="195"
          font-family="Bungee, 'Arial Black', sans-serif"
          font-size="200"
          font-weight="900"
          text-anchor="middle"
          fill="url(#csm6)"
          stroke="#ffffff"
          stroke-width="4"
          paint-order="stroke">6</text>
  </g>
</svg>
