<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="gfx6g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff96"/>
      <stop offset="100%" stop-color="#00b85e"/>
    </linearGradient>
    <filter id="gfxShadow6" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#003d22"/>
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#00d27a" flood-opacity="0.5"/>
