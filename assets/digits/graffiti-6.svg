  <g filter="url(#gfxShadow6)" transform="rotate(-8 100 130)">
    <!-- drips -->
    <ellipse cx="58" cy="210" rx="8" ry="14" fill="url(#gfx6g)" stroke="#0c0d18" stroke-width="3"/>
    <ellipse cx="140" cy="216" rx="6" ry="12" fill="url(#gfx6g)" stroke="#0c0d18" stroke-width="3"/>
    <text x="100" y="180"
